<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data to MongoDB</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 12px 30px; border: none; cursor: pointer; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .success { color: green; background: #d4edda; padding: 10px; border-radius: 5px; }
        .error { color: red; background: #f8d7da; padding: 10px; border-radius: 5px; }
        .message { margin-top: 20px; }
    </style>
</head>
<body>
    <h2>Submit User Data</h2>
    
    <form id="dataForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Age:</label>
            <input type="number" id="age" min="1" max="120" required>
        </div>
        <button type="submit" id="submitBtn">Submit Data</button>
    </form>
    
    <div id="message" class="message"></div>

    <script>
        const form = document.getElementById('dataForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value),
                timestamp: new Date().toISOString()
            };

            // Show loading
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            messageDiv.innerHTML = '';

            try {
                const response = await fetch('http://localhost:3000/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (result.success) {
                    // SUCCESS: Redirect to success page
                    window.location.href = 'success.html';
                } else {
                    // ERROR: Show on same page
                    throw new Error(result.error || 'Submission failed');
                }
                
            } catch (error) {
                // ERROR: Show on same page
                messageDiv.innerHTML = `
                    <div class="error">
                        <strong>Submission Failed:</strong> ${error.message}
                    </div>
                `;
            } finally {
                // Reset button
                submitBtn.textContent = 'Submit Data';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
